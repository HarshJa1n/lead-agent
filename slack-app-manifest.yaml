display_information:
  name: Lead Review Agent
  description: Native Slack AI agent for lead review and enrichment
  background_color: "#F4F1EA"
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Lead Review Agent
    always_online: false
  shortcuts:
    - name: Review lead
      type: message
      callback_id: review_lead
      description: Review this lead in thread
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - assistant:write
      - channels:history
      - chat:write
      - groups:history
      - im:history
      - im:read
      - im:write
      - mpim:history
      - reactions:write
      - users:read
settings:
  interactivity:
    is_enabled: true
    request_url: https://harshja1n-lead-review-agent.vercel.app/api/slack/interactivity
  event_subscriptions:
    request_url: https://harshja1n-lead-review-agent.vercel.app/api/slack/events
    bot_events:
      - app_mention
      - assistant_thread_started
      - assistant_thread_context_changed
      - message.channels
      - message.im
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
